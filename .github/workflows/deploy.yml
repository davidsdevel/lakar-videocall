name: "Deploy"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: "Deploy"
    environment:
      name: Production
      url: https://lakar.davidsdevel.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - run: npm ci

      - name: Restore build cache
        id: restore-build-cache
        uses: actions/cache/restore@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-build-lakar

      - run: npm run build

      - name: Save Build Cache
        id: save-build-cache
        uses: actions/cache/save@v4
        with:
          path: .next/cache
          key: ${{ steps.restore-build-cache.outputs.cache-primary-key }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: davidsdevel/lakar:latest          
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ejecutar comandos remotos por SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOYMENT_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEPLOYMENT_KEY }}
          script: |
            cd ~/peer
            docker compose pull lakar
            docker compose up -d
