name: "Deploy"

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: "Deploy"
    environment:
      name: Production
      url: https://lakar.davidsdevel.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - run: yarn

      - name: Restore build cache
        id: restore-build-cache
        uses: actions/cache/restore@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-build-lakar

      - run: yarn build

      - name: Save Build Cache
        id: save-build-cache
        uses: actions/cache/save@v4
        with:
          path: .next/cache
          key: ${{ steps.restore-build-cache.outputs.cache-primary-key }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: davidsdevel/lakar:latest

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOYMENT_KEY }}
          known_hosts: random

      - run: ssh-keyscan -H ${{ secrets.DEPLOYMENT_IP }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh root@${{ secrets.DEPLOYMENT_IP }} \
            "cd ~/lakar && docker compose pull && docker compose up -d"
